name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest   # использует виртуальную машину с Ubuntu

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: task_db
        ports:
          - 5444:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      steps:
        - name: Checkout repository # проверяет код из репозитория и клонирует его в виртуальную машину
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.10"
        - name: Install dependencies # устанавливает зависимости
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
        - name: Run tests  # запускает тесты
          env:
            SECRET_KEY: test_secret_key
            DATABASE_URL: postgresql://user:password@localhost:5444/task_db
          run: |
            python -m pytest -v

        - name: Build Docker image
          run: |
            docker build -t task-manager .