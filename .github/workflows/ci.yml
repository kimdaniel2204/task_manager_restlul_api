name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest   # использует виртуальную машину с Ubuntu

    steps:
      - name: Checkout repository # проверяет код из репозитория и клонирует его в виртуальную машину
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies # устанавливает зависимости
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests  # запускает тесты
        env:
          SECRET_KEY: test_secret_key
          DATABASE_URL: sqlite:///./test.db
        run: |
          python -m pytest

      - name: Build Docker image
        run: |
          docker build -t task-manager .