<!DOCTYPE html>
<html>
    <head>
        <title>FastAPI WebSocket Test</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    </head>
    <body class="bg-light">
        <div class="container mt-5">
            <h2>Live Task Notifications</h2>
            <div id="status" class="badge bg-secondary mb-3">Connecting...</div>
            <ul id="messages" class="list-group">
                </ul>
        </div>

        <script>
            // Подключаемся к твоему серверу
            const ws = new WebSocket("ws://127.0.0.1:8000/ws/notifications");

            ws.onopen = () => {
                document.getElementById('status').innerText = "Connected";
                document.getElementById('status').className = "badge bg-success mb-3";
            };

            ws.onmessage = (event) => {
                const messages = document.getElementById('messages');
                const message = document.createElement('li');
                message.className = "list-group-item list-group-item-info animate-in";
                message.innerText = event.data;
                messages.prepend(message); // Новые сообщения сверху
            };

            ws.onclose = () => {
                document.getElementById('status').innerText = "Disconnected";
                document.getElementById('status').className = "badge bg-danger mb-3";
            };
        </script>
    </body>
</html>
