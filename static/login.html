<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">Вход</h3>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" placeholder="admin@example.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Пароль</label>
                            <input type="password" id="password" class="form-control" placeholder="******">
                        </div>
                        <button onclick="login()" class="btn btn-primary w-100">Войти</button>
                        <div id="error-msg" class="text-danger mt-3" style="display:none;"></div>
                        <div class="text-center mt-3">
                        <a href="/register">Зарегистрироваться</a>
                    </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');

            // Формируем данные как требует OAuth2 (Form Data)
            const formData = new FormData();
            formData.append('username', email);
            formData.append('password', password);

            try {
                const response = await fetch('http://127.0.0.1:8000/auth/login', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    // Сохраняем токен в память браузера
                    localStorage.setItem('access_token', data.access_token);
                    // Переходим на дашборд
                    window.location.href = '/dashboard';
                } else {
                    errorDiv.innerText = "Неверный логин или пароль";
                    errorDiv.style.display = 'block';
                }
            } catch (e) {
                console.error(e);
                errorDiv.innerText = "Ошибка сервера";
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
