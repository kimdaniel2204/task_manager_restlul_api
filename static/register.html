<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация - Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">Регистрация</h3>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Пароль</label>
                            <input type="password" id="password" class="form-control" required>
                        </div>
                        <button onclick="register()" class="btn btn-success w-100">Создать аккаунт</button>
                        <div class="text-center mt-3">
                            <a href="/login">Уже есть аккаунт? Войти</a>
                        </div>
                        <div id="msg" class="mt-3 text-center" style="display:none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Функция для обработки регистрации
        async function register() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('msg');

            try {
                const response = await fetch('http://127.0.0.1:8000/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    msgDiv.className = "text-success mt-3";
                    msgDiv.innerText = "Регистрация успешна! Переходим ко входу...";
                    msgDiv.style.display = 'block';
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    const data = await response.json();
                    msgDiv.className = "text-danger mt-3";
                    msgDiv.innerText = data.detail || "Ошибка регистрации";
                    msgDiv.style.display = 'block';
                }
            } catch (e) {
                msgDiv.innerText = "Ошибка соединения";
                msgDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
